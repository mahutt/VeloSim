# Codecov configuration file
# See: https://docs.codecov.com/docs/codecov-yaml

codecov:
  require_ci_to_pass: yes
  notify:
    wait_for_ci: yes

coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: 70%
        threshold: 2%
        if_ci_failed: error

    patch:
      default:
        target: 70%
        threshold: 5%

  ignore:
    # Ignore configuration files
    - "**/.eslintrc.*"
    - "**/jest.config.*"
    - "**/vite.config.*"
    - "**/vitest.config.*"
    # Ignore build outputs
    - "**/build/**"
    - "**/dist/**"
    # Ignore test files themselves
    - "**/tests/**"
    - "**/*test*"
    - "**/*spec*"
    # Ignore documentation
    - "**/*.md"
    # Ignore specific files
    - "front/app/root.tsx"
    - "front/app/routes.ts"

flags:
  backend:
    paths:
      - back/
    carryforward: true

  simulation:
    paths:
      - sim/
    carryforward: true

  frontend:
    paths:
      - front/app/
    carryforward: true

component_management:
  individual_components:
    - component_id: backend_component
      name: Backend
      flag_regexes:
        - ^backend$
      paths:
        - back/**

    - component_id: frontend_component
      name: Frontend
      flag_regexes:
        - ^frontend$
      paths:
        - front/app/**

    - component_id: simulation_component
      name: Simulation
      flag_regexes:
        - ^simulation$
      paths:
        - sim/**

comment: false

github_checks:
  annotations: true
