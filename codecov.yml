# Codecov configuration file
# See: https://docs.codecov.com/docs/codecov-yaml

codecov:
  require_ci_to_pass: yes
  notify:
    wait_for_ci: yes

coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: 70%
        threshold: 2%
        if_ci_failed: error

    patch:
      default:
        target: 70%
        threshold: 5%

  ignore:
    # Ignore configuration files
    - "**/.eslintrc.*"
    - "**/jest.config.*"
    - "**/vite.config.*"
    - "**/vitest.config.*"
    # Ignore build outputs
    - "**/build/**"
    - "**/dist/**"
    # Ignore test files themselves
    - "**/tests/**"
    - "**/*test*"
    - "**/*spec*"
    # Ignore documentation
    - "**/*.md"
    # Ignore specific files
    - "front/app/root.tsx"
    - "front/app/routes.ts"

flags:
  backend:
    paths:
      - back/
    carryforward: false

  simulation:
    paths:
      - sim/
    carryforward: false

  frontend:
    paths:
      - front/app/
    carryforward: false

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false
  require_base: no
  require_head: yes

github_checks:
  annotations: true
