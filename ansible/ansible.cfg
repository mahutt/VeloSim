[defaults]
inventory = inventories/production
host_key_checking = False
timeout = 30
pipelining = True
gathering = smart
fact_caching = jsonfile
fact_caching_connection = ./facts_cache
fact_caching_timeout = 86400

[ssh_connection]
pipelining = True
ssh_args = -o ServerAliveInterval=30 -o ServerAliveCountMax=3 -o ConnectTimeout=15 -o ControlMaster=auto -o ControlPersist=60s
