# Nginx log rotation configuration for {{ domain_name }}
# Generated by Ansible template

/var/log/nginx/*.log /var/log/nginx/{{ domain_name }}/*.log {
    daily
    missingok
    rotate {{ nginx_log_retention_days | default(52) }}
    compress
    delaycompress
    notifempty
    create 644 www-data www-data
    sharedscripts
    postrotate
        if [ -f /var/run/nginx.pid ]; then
            kill -USR1 $(cat /var/run/nginx.pid)
        fi
    endscript
}

# Additional VeloSim specific logs
/var/log/nginx/{{ app_name }}_access.log
/var/log/nginx/{{ app_name }}_error.log {
    daily
    missingok
    rotate {{ nginx_log_retention_days | default(30) }}
    compress
    delaycompress
    notifempty
    create 644 www-data www-data
    sharedscripts
    postrotate
        if [ -f /var/run/nginx.pid ]; then
            kill -USR1 $(cat /var/run/nginx.pid)
        fi
    endscript
}