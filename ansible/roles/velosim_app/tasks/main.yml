---
# VeloSim Application Deployment

- name: Create application directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'
  loop:
    - "{{ app_dir }}"
    - "{{ app_dir }}/scripts"
    - "{{ app_dir }}/graphhopper-data"
    - "{{ app_dir }}/logs"
    - "{{ app_dir }}/backups"
    - "{{ app_dir }}/grafana_logging"
    - "{{ app_dir }}/loki/chunks"
    - "{{ app_dir }}/loki/index"
    - "{{ app_dir }}/loki/cache"
    - "{{ app_dir }}/loki/wal"
    - "{{ app_dir }}/loki/compactor"
    - "{{ app_dir }}/promtail/positions"
    - "{{ app_dir }}/prometheus"

- name: Set ownership for Loki and Promtail directories
  ansible.builtin.file:
    path: "{{ item }}"
    owner: "10001"
    group: "10001"
    recurse: true
    state: directory
  loop:
    - "{{ app_dir }}/loki"
    - "{{ app_dir }}/promtail"

- name: Set ownership for Prometheus directory
  ansible.builtin.file:
    path: "{{ app_dir }}/prometheus"
    owner: "65534"
    group: "65534"
    recurse: true
    state: directory

- name: Copy archive creation script
  delegate_to: localhost
  become: false
  ansible.builtin.copy:
    src: create-archive.sh
    dest: /tmp/create-archive.sh
    mode: '0755'

- name: Set archive path variable
  set_fact:
    archive_path: "/tmp/velosim-{{ ansible_date_time.epoch }}.tar.gz"

- name: Create temporary archive of application code
  delegate_to: localhost
  become: false
  ansible.builtin.shell: /tmp/create-archive.sh "{{ playbook_dir }}" "{{ archive_path }}"
  register: archive_result

- name: Copy application archive to server
  ansible.builtin.copy:
    src: "{{ archive_path }}"
    dest: "/tmp/velosim.tar.gz"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0644'

- name: Clean up local temporary script and archive
  delegate_to: localhost
  become: false
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/create-archive.sh
    - "{{ archive_path }}"

- name: Remove existing source directory
  ansible.builtin.file:
    path: "{{ app_dir }}/source"
    state: absent

- name: Create source directory
  ansible.builtin.file:
    path: "{{ app_dir }}/source"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'

- name: Extract application code
  ansible.builtin.unarchive:
    src: "/tmp/velosim.tar.gz"
    dest: "{{ app_dir }}/source"
    remote_src: true
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    extra_opts:
      - "--strip-components=1"

- name: Clean up macOS resource fork files from extracted code
  ansible.builtin.shell: |
    find "{{ app_dir }}/source" -name "._*" -type f -delete 2>/dev/null || true
    find "{{ app_dir }}/source" -name ".DS_Store" -type f -delete 2>/dev/null || true
  become_user: "{{ app_user }}"

- name: Clean up temporary file on server
  ansible.builtin.file:
    path: "/tmp/velosim.tar.gz"
    state: absent

- name: Copy permissions script
  ansible.builtin.copy:
    src: set-permissions.sh
    dest: /tmp/set-permissions.sh
    mode: '0755'

- name: Set executable permissions on shell scripts
  ansible.builtin.shell: /tmp/set-permissions.sh "{{ app_dir }}"

- name: Clean up temporary scripts
  ansible.builtin.file:
    path: /tmp/set-permissions.sh
    state: absent

- name: Generate JWT secret if not exists
  ansible.builtin.set_fact:
    velosim_jwt_secret: "{{ ansible_date_time.epoch | hash('sha256') | regex_replace('[^a-zA-Z0-9]', '') | truncate(64, True, '') }}"
  when: velosim_jwt_secret is not defined

- name: Check if JWT secret file exists
  ansible.builtin.stat:
    path: "{{ app_dir }}/.jwt_secret"
  register: jwt_secret_file

- name: Load existing JWT secret
  ansible.builtin.slurp:
    src: "{{ app_dir }}/.jwt_secret"
  register: existing_jwt_secret
  when: jwt_secret_file.stat.exists

- name: Use existing JWT secret if available
  ansible.builtin.set_fact:
    velosim_jwt_secret: "{{ existing_jwt_secret.content | b64decode | trim }}"
  when: jwt_secret_file.stat.exists

- name: Generate new JWT secret if needed
  ansible.builtin.set_fact:
    velosim_jwt_secret: "{{ lookup('password', '/dev/null length=64 chars=ascii_letters,digits') }}"
  when: not jwt_secret_file.stat.exists

- name: Store JWT secret for future deployments
  ansible.builtin.copy:
    content: "{{ velosim_jwt_secret }}"
    dest: "{{ app_dir }}/.jwt_secret"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0600'
  when: not jwt_secret_file.stat.exists

- name: Create production environment file
  ansible.builtin.template:
    src: env.prod.j2
    dest: "{{ app_dir }}/.env.prod"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0644'
  notify: restart velosim

- name: Create production Docker Compose file
  ansible.builtin.template:
    src: docker-compose.prod.yml.j2
    dest: "{{ app_dir }}/docker-compose.prod.yml"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0644'

- name: Create Loki configuration file
  ansible.builtin.template:
    src: loki-config.yaml.j2
    dest: "{{ app_dir }}/loki-config.yaml"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0644'
  notify: restart velosim

- name: Create Promtail configuration file
  ansible.builtin.template:
    src: promtail-config.yaml.j2
    dest: "{{ app_dir }}/promtail-config.yaml"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0644'
  notify: restart velosim

- name: Create Prometheus configuration file
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ app_dir }}/prometheus.yml"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0644'
  notify: restart velosim

- name: Copy GraphHopper data preparation script
  ansible.builtin.template:
    src: prepare-graphhopper-data.sh.j2
    dest: "{{ app_dir }}/scripts/prepare-graphhopper-data.sh"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'

- name: Prepare GraphHopper data if not exists
  ansible.builtin.command: "{{ app_dir }}/scripts/prepare-graphhopper-data.sh"
  become_user: "{{ app_user }}"
  args:
    creates: "{{ app_dir }}/graphhopper-data/montreal-latest.osm.pbf"
  when: setup_graphhopper_data | default(false)
  register: graphhopper_result

- name: Display GraphHopper preparation result
  ansible.builtin.debug:
    msg: |
      GraphHopper Data Preparation: {{ 'Completed' if graphhopper_result.rc == 0 else 'Failed or Skipped' }}
      {% if not (setup_graphhopper_data | default(false)) %}
      To enable GraphHopper data setup, set setup_graphhopper_data: true in group_vars
      {% endif %}

- name: Copy GraphHopper data preparation script
  ansible.builtin.template:
    src: prepare-graphhopper-data.sh.j2
    dest: "{{ app_dir }}/scripts/prepare-graphhopper-data.sh"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'

- name: Prepare GraphHopper data if not exists
  ansible.builtin.command: "{{ app_dir }}/scripts/prepare-graphhopper-data.sh"
  become_user: "{{ app_user }}"
  args:
    creates: "{{ app_dir }}/graphhopper-data/montreal-latest.osm.pbf"
  when: setup_graphhopper_data | default(false)
  ignore_errors: true
  register: graphhopper_result

- name: Display GraphHopper preparation result
  ansible.builtin.debug:
    msg: |
      GraphHopper Data Preparation: {{ 'Completed' if graphhopper_result.rc == 0 else 'Failed or Skipped' }}
      {% if not (setup_graphhopper_data | default(false)) %}
      To enable GraphHopper data setup, set setup_graphhopper_data: true in group_vars
      {% endif %}

- name: Create application management scripts
  ansible.builtin.template:
    src: velosim-app.sh.j2
    dest: "{{ app_dir }}/scripts/velosim-app.sh"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'

- name: Create systemd service for VeloSim
  ansible.builtin.template:
    src: velosim.service.j2
    dest: /etc/systemd/system/velosim.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - reload systemd
    - enable velosim service

- name: Create database migration script
  ansible.builtin.template:
    src: migrate-database.sh.j2
    dest: "{{ app_dir }}/scripts/migrate-database.sh"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'

- name: Ensure PostgreSQL container is running
  ansible.builtin.command: docker compose --project-name "{{ app_name }}" -f "{{ app_dir }}/docker-compose.prod.yml" up -d postgres
  become_user: "{{ app_user }}"
  args:
    chdir: "{{ app_dir }}"

- name: Get PostgreSQL data volume name
  ansible.builtin.command: >-
    docker inspect velosim-postgres
    --format "{{ '{{' }} range .Mounts {{ '}}' }}{{ '{{' }} if eq .Destination \"/var/lib/postgresql/data\" {{ '}}' }}{{ '{{' }} .Name {{ '}}' }}{{ '{{' }} end {{ '}}' }}{{ '{{' }} end {{ '}}' }}"
  become_user: "{{ app_user }}"
  register: postgres_data_volume
  changed_when: false

- name: Display PostgreSQL data volume
  ansible.builtin.debug:
    msg: "PostgreSQL data volume: {{ postgres_data_volume.stdout | trim }}"

- name: Ensure PostgreSQL is using expected persistent volume
  ansible.builtin.assert:
    that:
      - postgres_data_volume.stdout | trim == app_name + '_postgres_data'
    fail_msg: >-
      PostgreSQL is using unexpected data volume '{{ postgres_data_volume.stdout | trim }}'
      (expected '{{ app_name }}_postgres_data'). Aborting to prevent accidental
      deployment against an empty/new database volume.
    success_msg: >-
      PostgreSQL data volume matches expected persistent volume '{{ app_name }}_postgres_data'.

- name: Debug - Check container status
  ansible.builtin.command: docker compose --project-name "{{ app_name }}" -f "{{ app_dir }}/docker-compose.prod.yml" ps
  become_user: "{{ app_user }}"
  args:
    chdir: "{{ app_dir }}"
  register: container_debug

- name: Display container status
  ansible.builtin.debug:
    msg: |
      Current container status:
      {{ container_debug.stdout }}

- name: Wait for PostgreSQL container to be healthy
  ansible.builtin.command: docker compose --project-name "{{ app_name }}" -f "{{ app_dir }}/docker-compose.prod.yml" ps postgres
  become_user: "{{ app_user }}"
  args:
    chdir: "{{ app_dir }}"
  register: postgres_status
  until: postgres_status.stdout is search("Up.*healthy|Up.*running")
  retries: 12
  delay: 10

- name: Wait for PostgreSQL to be ready
  ansible.builtin.wait_for:
    port: 5432
    host: 127.0.0.1
    delay: 5
    timeout: 30

- name: Run database migrations
  ansible.builtin.command:
    cmd: "{{ app_dir }}/scripts/migrate-database.sh"
  become_user: "{{ app_user }}"
  register: migration_result
  changed_when: migration_result.stdout is search('Database schema created|Database migrations completed')

- name: Display migration results
  ansible.builtin.debug:
    msg: |
      Database migration completed:
      {{ migration_result.stdout }}
      {% if migration_result.stderr %}
      Errors: {{ migration_result.stderr }}
      {% endif %}

- name: Build and start VeloSim application
  block:
    - name: Start VeloSim application (attempt 1)
      ansible.builtin.command: "{{ app_dir }}/scripts/velosim-app.sh start"
      become_user: "{{ app_user }}"
      async: "{{ app_start_timeout_seconds | default(720) }}"
      poll: 0
      register: app_start_job

    - name: Wait for VeloSim application start to finish (attempt 1)
      ansible.builtin.async_status:
        jid: "{{ app_start_job.ansible_job_id }}"
      become_user: "{{ app_user }}"
      register: app_start_result
      until: app_start_result.finished
      retries: "{{ ((app_start_timeout_seconds | default(720)) // 15) | int }}"
      delay: 15
      failed_when: app_start_result.rc is not defined or app_start_result.rc != 0

  rescue:
    - name: Retry VeloSim application start once after failed first attempt
      ansible.builtin.debug:
        msg: "First VeloSim start attempt failed or timed out; retrying once."

    - name: Start VeloSim application (retry attempt)
      ansible.builtin.command: "{{ app_dir }}/scripts/velosim-app.sh start"
      become_user: "{{ app_user }}"
      async: "{{ app_start_timeout_seconds | default(720) }}"
      poll: 0
      register: app_start_job_retry

    - name: Wait for VeloSim application start to finish (retry attempt)
      ansible.builtin.async_status:
        jid: "{{ app_start_job_retry.ansible_job_id }}"
      become_user: "{{ app_user }}"
      register: app_start_result_retry
      until: app_start_result_retry.finished
      retries: "{{ ((app_start_timeout_seconds | default(720)) // 15) | int }}"
      delay: 15
      failed_when: app_start_result_retry.rc is not defined or app_start_result_retry.rc != 0

    - name: Promote retry result for downstream tasks
      ansible.builtin.set_fact:
        app_start_result: "{{ app_start_result_retry }}"

- name: Check Docker container status
  ansible.builtin.command: docker ps -a --filter "name=velosim" --format "table {{ '{{.Names}}' }}\t{{ '{{.Status}}' }}\t{{ '{{.Ports}}' }}"
  register: container_status
  become_user: "{{ app_user }}"

- name: Display container status
  ansible.builtin.debug:
    msg: |
      Container Status:
      {{ container_status.stdout }}

      App Start Command Output:
      {{ app_start_result.stdout }}
      {% if app_start_result.stderr %}
      Errors:
      {{ app_start_result.stderr }}
      {% endif %}

- name: Wait for application to be ready
  ansible.builtin.uri:
    url: "http://localhost:8000/health"
    method: GET
    timeout: 15
  register: health_check
  until: health_check.status == 200
  retries: 40
  delay: 15
  ignore_errors: true

- name: Display application status
  ansible.builtin.debug:
    msg: |
      VeloSim application deployment completed!
      Health check: {{ 'PASSED' if health_check.status == 200 else 'FAILED' }}
      Application directory: {{ app_dir }}
      Management script: {{ app_dir }}/scripts/velosim-app.sh

      {% if health_check.status != 200 %}
      If the application is not responding:

      1. Check container status:
         sudo docker ps -a

      2. Check container logs:
         sudo docker logs velosim-backend
         sudo docker logs velosim-frontend
         sudo docker logs velosim-postgres
         sudo docker logs velosim-graphhopper

      3. Check if services are building:
         sudo docker compose -f {{ app_dir }}/docker-compose.prod.yml build --progress=plain

      4. Restart the application:
         sudo {{ app_dir }}/scripts/velosim-app.sh restart

      5. Check if ports are blocked:
        sudo netstat -tlnp | grep -E ':(3000|8000|5432|5001|8989)'

      6. Force rebuild and restart:
         sudo docker compose -f {{ app_dir }}/docker-compose.prod.yml down
         sudo docker compose -f {{ app_dir }}/docker-compose.prod.yml build --no-cache
         sudo docker compose -f {{ app_dir }}/docker-compose.prod.yml up -d
      {% endif %}
