# VeloSim application log rotation configuration
# Generated by Ansible template

# Application logs
{{ app_log_path | default('/var/log/' + app_name) }}/*.log {
    daily
    missingok
    rotate {{ app_log_retention_days | default(7) }}
    compress
    notifempty
    create 644 {{ app_user | default('root') }} {{ app_group | default('root') }}
    postrotate
        # Send HUP signal to application if running
        if [ -f {{ app_pid_path | default('/var/run/' + app_name + '.pid') }} ]; then
            kill -HUP $(cat {{ app_pid_path | default('/var/run/' + app_name + '.pid') }})
        fi
        # Restart Docker containers to pick up log rotation
        if command -v docker &> /dev/null; then
            docker restart {{ app_name }}_backend_1 {{ app_name }}_frontend_1 2>/dev/null || true
        fi
    endscript
}

# Docker container logs (if using Docker logging driver)
{% if docker_log_rotation | default(true) %}
/var/lib/docker/containers/*/*.log {
    daily
    missingok
    rotate {{ docker_log_retention_days | default(7) }}
    compress
    notifempty
    copytruncate
    maxsize {{ docker_log_maxsize | default('100M') }}
}
{% endif %}

# Nginx logs specific to {{ app_name }}
{% if nginx_log_rotation | default(true) %}
{{ nginx_log_path | default('/var/log/nginx') }}/{{ app_name }}_access.log
{{ nginx_log_path | default('/var/log/nginx') }}/{{ app_name }}_error.log {
    daily
    missingok
    rotate {{ nginx_log_retention_days | default(30) }}
    compress
    delaycompress
    notifempty
    create 644 www-data adm
    sharedscripts
    postrotate
        if [ -f /var/run/nginx.pid ]; then
            kill -USR1 $(cat /var/run/nginx.pid)
        fi
    endscript
}
{% endif %}