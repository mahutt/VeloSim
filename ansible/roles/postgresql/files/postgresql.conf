# PostgreSQL configuration overrides for VeloSim production
# These settings optimize PostgreSQL for the VeloSim workload

# Connection settings
# Limit concurrent connections to prevent resource exhaustion
max_connections = 100

# Memory settings
# Allocate shared memory for caching frequently accessed data
shared_buffers = 256MB
# Estimate of total memory available for caching
effective_cache_size = 1GB

# Write-Ahead Logging (WAL) settings
# Enable replication support for potential future scaling
wal_level = replica
max_wal_size = 2GB
min_wal_size = 80MB

# Logging configuration for debugging and monitoring
log_destination = 'stderr'
# Log data modification statements for audit trail
log_statement = 'mod'
# Log query execution time for performance monitoring
log_duration = on
# Include useful context in log lines
log_line_prefix = '%t [%p-%l] %q%u@%d '

# Performance tuning
# Adjust for SSD storage (lower random page cost)
random_page_cost = 1.1
# Memory for sorting and hash operations
work_mem = 4MB
# Memory for maintenance operations like VACUUM
maintenance_work_mem = 64MB

# Checkpoint configuration
# Spread checkpoint I/O over time to reduce performance spikes
checkpoint_completion_target = 0.9
checkpoint_timeout = 10min

# Autovacuum settings
# Enable automatic cleanup of dead rows
autovacuum = on
# Use more workers for better cleanup performance
autovacuum_max_workers = 3
# Run autovacuum more frequently for busy tables
autovacuum_naptime = 30s