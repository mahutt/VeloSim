global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "velosim"
    metrics_path: /api/v1/metric/metrics
    static_configs:
      - targets: ["backend:8000"]

  # Node Exporter - Host-level metrics (namely resource usage)
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # cAdvisor - Container-level metrics (per-container resource usage)
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
