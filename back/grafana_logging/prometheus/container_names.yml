# Recording rules for container metrics
# These rules create simplified metrics that work across platforms

groups:
  - name: container_metrics_simplified
    interval: 10s
    rules:
      # Total CPU usage across all containers (aggregated)
      - record: velosim_total_cpu_percent
        expr: |
          sum(rate(container_cpu_usage_seconds_total{id=~"/docker/.*", id!="/docker", id!~".*/buildkit.*"}[1m])) * 100

      # Total memory usage across all containers
      - record: velosim_total_memory_bytes
        expr: |
          sum(container_memory_usage_bytes{id=~"/docker/.*", id!="/docker", id!~".*/buildkit.*"})

      # Per-container CPU - creates metrics with container_id_short label
      - record: velosim_container_cpu_percent
        expr: |
          label_replace(
            sum by (id) (rate(container_cpu_usage_seconds_total{id=~"/docker/[a-f0-9]+", id!~".*/buildkit.*"}[1m])) * 100,
            "container_id_short", "$1", "id", "/docker/([a-f0-9]{12}).*"
          )

      # Per-container memory - creates metrics with container_id_short label
      - record: velosim_container_memory_bytes
        expr: |
          label_replace(
            container_memory_usage_bytes{id=~"/docker/[a-f0-9]+", id!~".*/buildkit.*"},
            "container_id_short", "$1", "id", "/docker/([a-f0-9]{12}).*"
          )

      # Per-container memory working set
      - record: velosim_container_memory_working_set_bytes
        expr: |
          label_replace(
            container_memory_working_set_bytes{id=~"/docker/[a-f0-9]+", id!~".*/buildkit.*"},
            "container_id_short", "$1", "id", "/docker/([a-f0-9]{12}).*"
          )

  - name: container_id_mapping
    interval: 30s
    rules:
      # Container info from Docker SD - provides container_name to container_id mapping
      - record: container_id_to_name
        expr: |
          label_replace(
            label_replace(
              up{job="docker-containers"} * 0 + 1,
              "container_id_short", "$1", "container_id", "([a-f0-9]{12}).*"
            ),
            "name", "$1", "container_name", "(.*)"
          )
