worker_processes auto;
events { worker_connections 1024; }

http {
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
  access_log /var/log/nginx/access.log main;

  server {
    listen 80;

    # Preserve /api/* when proxying to FastAPI on port 8000
    location /api/ {
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;

      # WebSocket support
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      # Explicitly forward cookies
      proxy_set_header Cookie $http_cookie;

      # Increase timeouts for WebSocket connections
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;

      # no trailing slash here so the path is preserved
      proxy_pass http://127.0.0.1:8000;
    }

    # Optional passthrough health
    location = /health {
      proxy_pass http://127.0.0.1:8000/health;
    }

    # Proxy version endpoint
    location = /proxy-version {
      add_header Content-Type text/plain;
      return 200 "nginx-proxy version: 2024-11-11\n";
    }

    # Everything else -> frontend SSR
    location / {
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_read_timeout 300s;
      # keep trailing slash here for frontend because node server expects '/'
      proxy_pass http://127.0.0.1:3000/;
    }
  }

  # Map for WebSocket connection upgrade
  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }
}
