version: "3.8"

networks:
  velosim-net:
    driver: bridge

volumes:
  postgres_data:
    driver: local

services:
  # --- Postgres ---
  postgres:
    image: postgres:15-alpine
    container_name: velosim-postgres
    environment:
      POSTGRES_USER: velosim
      POSTGRES_PASSWORD: velosim
      POSTGRES_DB: velosim
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./back/database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./back/alembic/seeds:/docker-entrypoint-initdb.d/seeds
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U velosim"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - velosim-net

  # --- Loki ---
  loki:
    image: grafana/loki:2.9.0
    container_name: velosim-loki
    ports:
      - "3100:3100"
    volumes:
      - ./back/grafana_logging/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - ./back/grafana_logging/loki/chunks:/loki/chunks
      - ./back/grafana_logging/loki/index:/loki/index
      - ./back/grafana_logging/loki/cache:/loki/cache
      - ./back/grafana_logging/loki/wal:/loki/wal
      - ./back/grafana_logging/loki/compactor:/loki/compactor
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - velosim-net

  # --- Grafana ---
  grafana:
    image: grafana/grafana:11.0.0
    container_name: velosim-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./back/grafana_logging/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - velosim-net

  # --- Promtail ---
  promtail:
    image: grafana/promtail:2.9.0
    container_name: velosim-promtail
    volumes:
      - ./back/grafana_logging/promtail/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log:/var/log:ro
      - ./back/grafana_logging/promtail/positions:/var/lib/promtail
      - ./back/grafana_logging:/logs:ro
    command: -config.file=/etc/promtail/promtail-config.yaml
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - velosim-net
