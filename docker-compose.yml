networks:
  velosim-net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  prometheus_data:
    driver: local

services:
  # --- Postgres ---
  postgres:
    image: postgres:15-alpine
    container_name: velosim-postgres
    environment:
      POSTGRES_USER: velosim
      POSTGRES_PASSWORD: velosim
      POSTGRES_DB: velosim
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./back/database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./back/alembic/seeds:/docker-entrypoint-initdb.d/seeds
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U velosim"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - velosim-net

  # --- Loki ---
  loki:
    image: grafana/loki:2.9.0
    container_name: velosim-loki
    ports:
      - "3100:3100"
    volumes:
      - ./back/grafana_logging/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - ./back/grafana_logging/loki/chunks:/loki/chunks
      - ./back/grafana_logging/loki/index:/loki/index
      - ./back/grafana_logging/loki/cache:/loki/cache
      - ./back/grafana_logging/loki/wal:/loki/wal
      - ./back/grafana_logging/loki/compactor:/loki/compactor
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - velosim-net

  # --- Grafana ---
  grafana:
    image: grafana/grafana:11.0.0
    container_name: velosim-grafana
    ports:
      - "3001:3000"  # Expose on 3001 to avoid conflict with frontend
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=velosim
    volumes:
      # Provisioning files for datasources/dashboards
      - ./back/grafana_logging/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./back/grafana_logging/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro

      # Persistent Grafana data (dashboards, settings, etc)
      - ./back/grafana_logging/grafana_data:/var/lib/grafana

    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - velosim-net

  # --- Promtail ---
  promtail:
    image: grafana/promtail:2.9.0
    container_name: velosim-promtail
    volumes:
      - ./back/grafana_logging/promtail/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log:/var/log:ro
      - ./back/grafana_logging/promtail/positions:/var/lib/promtail
      - ./back/grafana_logging:/logs:ro
    command: -config.file=/etc/promtail/promtail-config.yaml
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - velosim-net

  # --- OSRM Routing Server ---
  osrm:
# Architecture-specific OSRM v6.0.0 image
    # Defaults to arm64 if not set (most common for Mac M1/M2)
    image: ${OSRM_IMAGE:-ghcr.io/project-osrm/osrm-backend:v6.0.0@sha256:733da1be48587358a417750655cc4748bbae9af60e3ace610db68d4febe038d8}
    container_name: velosim-osrm
    ports:
      - "5001:5000"
    volumes:
      - ./osrm-data:/data:ro
    command: osrm-routed --algorithm mld /data/montreal.osrm
    restart: unless-stopped
    networks:
      - velosim-net

  # --- Backend API ---
  backend:
    build:
      context: .
      dockerfile: back/Dockerfile
    container_name: velosim-backend
    ports:
      - "8000:8000"
    volumes:
      - ./back:/app/back
      - ./sim:/app/sim
      - ./scripts:/app/scripts
    environment:
# Database connection
      - DATABASE_URL=postgresql://velosim:velosim@postgres:5432/velosim
# OSRM connection - use service name for Docker networking
      - OSRM_URL=http://osrm:5000
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      osrm:
        condition: service_started  # Changed from service_healthy since health check is disabled
    restart: unless-stopped
    networks:
      - velosim-net

  # --- Frontend (For full deployment) ---
  frontend:
    build:
      context: .
      dockerfile: front/Dockerfile
      args:
        - VITE_MAPBOX_ACCESS_TOKEN=${MAPBOX_ACCESS_TOKEN:-}
        - VITE_BACKEND_URL=http://localhost:8000
    container_name: velosim-frontend
    ports:
      - "3000:3000"  # Frontend always uses 3000 (both Docker and production)
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - velosim-net

  # --- Nginx Proxy (For full deployment) ---
  proxy:
    build:
      context: ./docker/nginx-proxy
      dockerfile: Dockerfile
    container_name: velosim-proxy
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - velosim-net

# --- Prometheus ---
  prometheus:
    image: prom/prometheus:latest
    container_name: velosim-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./back/grafana_logging/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped
    networks:
      - velosim-net

  # --- Node Exporter (Host metrics for resource usage) ---
  node-exporter:
    image: prom/node-exporter:latest
    container_name: velosim-node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped
    networks:
      - velosim-net

  # --- cAdvisor (Container-level metrics: per-container resource usage) ---
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: velosim-cadvisor
    ports:
      - "8090:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    restart: unless-stopped
    networks:
      - velosim-net
