default_language_version:
  python: python3.11

repos:
  # Python hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/psf/black
    rev: 25.9.0
    hooks:
      - id: black
        files: ^(back|sim)/.*\.py$
        exclude: ^back/alembic/.*\.py$
        args: [--line-length=88]

  - repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        files: ^(back|sim)/.*\.py$
        exclude: ^back/alembic/.*\.py$
        args: [--max-line-length=88]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.2
    hooks:
      - id: mypy
        files: ^(back|sim)/.*\.py$
        exclude: ^back/alembic/.*\.py$
        additional_dependencies:
          [
            types-requests,
            pytest,
            pydantic,
            pydantic-settings,
            python-dotenv,
            sqlalchemy,
            fastapi,
            types-networkx,
            pandas-stubs,
            types-shapely,
            types-geopandas,
          ]
        args: [--config-file=pyproject.toml]

  # Frontend hooks
  - repo: local
    hooks:
      - id: prettier-frontend
        name: Prettier (Frontend)
        entry: bash -c 'cd front && npx prettier --write "${@#front/}"' --
        language: system
        files: ^front/.*\.(js|jsx|ts|tsx|json|css|md)$
        pass_filenames: true

      - id: eslint-frontend
        name: ESLint (Frontend)
        entry: bash -c 'cd front && npx eslint --fix "${@#front/}"' --
        language: system
        files: ^front/.*\.(js|jsx|ts|tsx)$
        pass_filenames: true

  # Custom hooks for commit message validation and license headers
  - repo: local
    hooks:
      - id: validate-license-headers
        name: MIT License Header Validation
        entry: bash -c 'if [ -f .venv/bin/python ]; then .venv/bin/python scripts/validate_license_headers.py; elif [ -f .venv/Scripts/python.exe ]; then .venv/Scripts/python.exe scripts/validate_license_headers.py; else python scripts/validate_license_headers.py; fi'
        language: system
        files: \.(py|js|jsx|ts|tsx)$
        pass_filenames: false

      - id: validate-dependency-licenses
        name: Dependency License Compatibility Validation
        entry: bash -c 'if [ -f .venv/bin/python ]; then .venv/bin/python scripts/validate_dependency_licenses.py; elif [ -f .venv/Scripts/python.exe ]; then .venv/Scripts/python.exe scripts/validate_dependency_licenses.py; else python scripts/validate_dependency_licenses.py; fi'
        language: system
        files: ^(pyproject\.toml|front/package\.json|front/package-lock\.json)$
        pass_filenames: false

      - id: validate-init-files
        name: Python __init__.py Files Validation
        entry: bash -c 'if [ -f .venv/bin/python ]; then .venv/bin/python scripts/validate_init_files.py; elif [ -f .venv/Scripts/python.exe ]; then .venv/Scripts/python.exe scripts/validate_init_files.py; else python scripts/validate_init_files.py; fi'
        language: system
        files: ^(back|sim)/.*\.py$
        pass_filenames: false

      - id: validate-branch-name
        name: Branch Naming Convention Validation
        entry: bash -c 'if [ -f .venv/bin/python ]; then .venv/bin/python scripts/validate_branch_name.py; elif [ -f .venv/Scripts/python.exe ]; then .venv/Scripts/python.exe scripts/validate_branch_name.py; else python scripts/validate_branch_name.py; fi'
        language: system
        always_run: true
        pass_filenames: false

      - id: validate-commit-message
        name: Validate Commit Message (Conventional + Issue Number)
        entry: bash -c 'if [ -f .venv/bin/python ]; then .venv/bin/python scripts/validate_commit_wrapper.py "$@"; elif [ -f .venv/Scripts/python.exe ]; then .venv/Scripts/python.exe scripts/validate_commit_wrapper.py "$@"; else python scripts/validate_commit_wrapper.py "$@"; fi' --
        language: system
        stages: [commit-msg]
        pass_filenames: true
