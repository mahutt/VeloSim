name: Main Branch CI

on:
  push:
    branches:
      - main

jobs:
  # Backend Tests
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: velosim_test
          POSTGRES_PASSWORD: velosim_test
          POSTGRES_DB: velosim_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt', '**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Install PostgreSQL client tools
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U velosim_test; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

      - name: Run Alembic migrations
        env:
          DATABASE_URL: postgresql://velosim_test:velosim_test@localhost:5432/velosim_test
        run: |
          cd back
          alembic upgrade head

      - name: Validate migration seeding (npm db:seed)
        env:
          DATABASE_URL: postgresql://velosim_test:velosim_test@localhost:5432/velosim_test
        run: |
          echo "Testing npm run db:seed command..."
          npm run db:seed || {
            echo "ERROR: npm run db:seed failed"
            echo "This means the seeding process has errors that need to be fixed"
            exit 1
          }
          echo "npm run db:seed completed successfully"

      - name: Cache Traffic Assets
        id: traffic-cache
        uses: actions/cache@v4
        with:
          path: sim/traffic/traffic_datasets
          key: ${{ runner.os }}-traffic-v1
          restore-keys: |
            ${{ runner.os }}-traffic-

      - name: Fetch default traffic csv (npm run traffic-csv)
        if: steps.traffic-cache.outputs.cache-hit != 'true'
        run: |
          echo "Cache miss: Fetching traffic from drive..."
          npm run traffic-csv || {
            echo "ERROR: npm run traffic-csv failed"
            echo "Traffic csv process might have an issue that needs to be fixed"
            exit 1
          }
          echo "npm run traffic-csv completed successfully"

      - name: Extract packaged traffic templates (npm run traffic-templates)
        if: steps.traffic-cache.outputs.cache-hit != 'true'
        run: |
          echo "Cache miss: Extracting templates from packaged archive..."
          npm run traffic-templates || {
            echo "ERROR: npm run traffic-templates failed"
            echo "Traffic template extraction failed"
            exit 1
          }
          echo "npm run traffic-templates completed successfully"

      - name: Validate Python package structure
        run: |
          python scripts/validate_init_files.py

      - name: Lint with flake8
        run: |
          flake8 back

      - name: Check formatting with black
        run: |
          black --check back

      - name: Type check with mypy
        run: |
          mypy back
        continue-on-error: false

      - name: Run tests with pytest
        env:
          DATABASE_URL: postgresql://velosim_test:velosim_test@localhost:5432/velosim_test
        run: |
          pytest back --cov=back --cov-report=term-missing --cov-report=xml --cov-fail-under=70

      - name: Check for model-migration mismatches
        env:
          DATABASE_URL: postgresql://velosim_test:velosim_test@localhost:5432/velosim_test
        run: |
          cd back
          echo "Checking for unapplied model changes..."
          alembic check || echo "⚠️ Warning: Model changes detected that don't have migrations!"

      - name: Upload backend coverage to Codecov
        uses: codecov/codecov-action@v5.5.1
        with:
          files: ./coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # Simulation Tests
  simulation-tests:
    name: Simulation Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt', '**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Validate Python package structure
        run: |
          python scripts/validate_init_files.py

      - name: Lint with flake8
        run: |
          flake8 sim

      - name: Check formatting with black
        run: |
          black --check sim

      - name: Type check with mypy
        run: |
          mypy sim
        continue-on-error: false

      - name: Run tests with pytest
        run: |
          pytest sim --cov=sim --cov-report=term-missing --cov-report=xml --cov-fail-under=70

      - name: Upload simulation coverage to Codecov
        uses: codecov/codecov-action@v5.5.1
        with:
          files: ./coverage.xml
          flags: simulation
          name: simulation-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # Frontend Tests
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        working-directory: ./front
        run: npm ci

      - name: Type check
        working-directory: ./front
        run: npm run typecheck

      - name: Lint
        working-directory: ./front
        run: npm run lint

      - name: Format check
        working-directory: ./front
        run: npx prettier --check app/**/*.{js,jsx,ts,tsx,json,css,md} --no-error-on-unmatched-pattern

      - name: Run tests with coverage
        working-directory: ./front
        run: npm run coverage

      - name: Upload frontend coverage to Codecov
        uses: codecov/codecov-action@v5.5.1
        with:
          files: ./front/coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # Frontend Build
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        working-directory: ./front
        run: npm ci

      - name: Build
        working-directory: ./front
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: front/build/
          retention-days: 7

  # Notify on failure
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [backend-tests, simulation-tests, frontend-tests, frontend-build]
    if: failure()

    steps:
      - name: Send failure notification
        run: |
          echo "::error::Main branch CI failed!"
          echo "::error::One or more checks failed after merge to main."
          echo "::error::This indicates code was merged without proper validation."
          echo "::error::Please review the failed jobs above and create a hotfix immediately."
          echo "::error::"
          echo "::error::Failed jobs may include:"
          echo "::error::- Backend tests or type checking"
          echo "::error::- Simulation tests or type checking"
          echo "::error::- Frontend tests, linting, or build"
          echo "::error::"
          echo "::error::Action required: Create a hotfix branch and fix the issues ASAP."

  # Success summary
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [backend-tests, simulation-tests, frontend-tests, frontend-build]
    if: success()

    steps:
      - name: CI passed
        run: |
          echo "All CI checks passed on main branch!"
          echo "Backend: Tests, linting, type checking passed"
          echo "Simulation: Tests, linting, type checking passed"
          echo "Frontend: Tests, linting, type checking, build passed"
          echo "Main branch is healthy and deployable"
