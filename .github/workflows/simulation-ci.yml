name: Simulation CI

on:
  workflow_call:

jobs:
  # Simulation Tests
  simulation-tests:
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python environment
        uses: ./.github/actions/setup-python-env

      - name: Validate Python package structure
        run: |
          python scripts/validate_init_files.py

      - name: Validate docstrings
        run: |
          python scripts/validate_docstrings.py sim

      - name: Lint with flake8
        run: |
          flake8 sim

      - name: Check formatting with black
        run: |
          black --check sim

      - name: Type check with mypy
        run: |
          mypy sim

      - name: Run tests with pytest
        run: |
          pytest sim --cov=sim --cov-report=term-missing --cov-report=xml --cov-fail-under=90

      - name: Upload coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5.5.1
        with:
          files: ./coverage.xml
          flags: simulation
          name: simulation-coverage
          fail_ci_if_error: false
