# Configuration for auto-assign-action
# This determines how reviewers are automatically assigned based on changed files

# Add reviewers to pull requests
addReviewers: true

# Add assignees to pull requests
addAssignees: false

# Number of reviewers to add
numberOfReviewers: 2

# Number of assignees to add
numberOfAssignees: 0

# Skip keywords - if PR title/description contains these, skip auto-assignment
skipKeywords:
  - "WIP"
  - "wip"
  - "[skip-review]"
  - "draft"

# Reviewer selection based on file patterns
reviewers:
  # Backend team for backend changes
  - users:
      - "Niravanaa"
      - "Verdone"
      - "Michael-Mezzacappa"
      - "briantkatch"
    patterns:
      - "back/**"

  # Simulation team for simulation changes
  - users:
      - "vinishamanek"
      - "cmezzac"
      - "Ambrose821"
      - "MeSumo"
      - "CarciDev"
    patterns:
      - "sim/**"

  # Frontend team for frontend changes
  - users:
      - "mahutt"
      - "Jpuntul"
    patterns:
      - "front/**"

# Assignee selection (disabled for now)
assignees: []

# Filter PRs by author (can exclude bot accounts, etc.)
filterLabels: []

# Run only on specific events
runOnDraft: false
